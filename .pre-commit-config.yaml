repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
        args: [--check]
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        language: system
        pass_filenames: false
        always_run: true
        entry: uv run mypy .
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: uv run pytest
        language: system
        pass_filenames: false
        always_run: true