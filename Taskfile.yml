# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

tasks:
  default:
    cmd: task --list

  qa:
    desc: Run all quality checks (lint, format, types, tests)
    cmd: uv run pre-commit run --all-files

  qa:fix:
    desc: Auto-fix lint and formatting issues
    cmds:
      - uv run ruff check --fix .
      - uv run ruff format .

  run:
    desc: Run the daily digest application
    cmd: uv run python -m daily_digest.main